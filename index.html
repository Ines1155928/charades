<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聽你在吹牛 (Google Sheets 雲端版)</title>
  
  <!-- 載入 Tailwind CSS 進行快速排版 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 React 核心庫 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 載入 Babel 以便在瀏覽器中編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 圖示元件 (取代原本需要安裝的 lucide-react 套件) ---
    const IconPlay = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
    );
    const IconPlus = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    );
    const IconSettings = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    );
    const IconHome = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
    );
    const IconCheck = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>
    );
    const IconX = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    );
    const IconLoader2 = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>
    );
    const IconTrophy = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"></path></svg>
    );
    const IconAlertCircle = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
    );

    // --- 主程式開始 ---
    function App() {
      const [currentScreen, setCurrentScreen] = useState('menu');
      const [scriptUrl, setScriptUrl] = useState('');
      const [isLoading, setIsLoading] = useState(false);
      const [message, setMessage] = useState('');
      const [words, setWords] = useState([]);
      const [currentWordIndex, setCurrentWordIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [timeLeft, setTimeLeft] = useState(60);
      const [isPlaying, setIsPlaying] = useState(false);
      
      const timerRef = useRef(null);

      const defaultWords = ['蘋果', '大象', '游泳', '看電影', '溜冰', '香蕉', '鋼琴', '睡覺', '機器人', '打籃球'];

      useEffect(() => {
        const savedUrl = localStorage.getItem('charadesScriptUrl');
        if (savedUrl) {
          setScriptUrl(savedUrl);
        }
      }, []);

      const handleSaveUrl = (url) => {
        setScriptUrl(url);
        localStorage.setItem('charadesScriptUrl', url);
        setMessage('設定已儲存！');
        setTimeout(() => setMessage(''), 3000);
      };

      const handleAddWord = async (word) => {
        if (!word.trim()) return;
        
        setIsLoading(true);
        setMessage('');

        if (!scriptUrl) {
          setTimeout(() => {
            setIsLoading(false);
            setMessage(`已本機暫存：${word}`);
          }, 500);
          return;
        }

        try {
          const url = `${scriptUrl}?action=addWord&word=${encodeURIComponent(word)}`;
          const response = await fetch(url);
          const result = await response.json();
          
          if (result.success) {
            setMessage('題目新增成功！');
          } else {
            setMessage('新增失敗，請重試。');
          }
        } catch (error) {
          console.error('Error adding word:', error);
          setMessage('連線錯誤，請確認網址是否正確。');
        } finally {
          setIsLoading(false);
          setTimeout(() => setMessage(''), 3000);
        }
      };

      const startGame = async () => {
        setIsLoading(true);
        setMessage(''); // 清除可能有的錯誤訊息
        let gameWords = [...defaultWords];

        if (scriptUrl) {
          try {
            const response = await fetch(`${scriptUrl}?action=getWords`);
            const result = await response.json();
            if (result && result.length > 0) {
              gameWords = result;
            }
          } catch (error) {
            console.error('Error fetching words:', error);
            setMessage('無法從 Google Sheets 取得題目，將使用預設題庫。');
            setTimeout(() => setMessage(''), 3000);
          }
        }

        const shuffled = gameWords.sort(() => 0.5 - Math.random());
        
        setWords(shuffled);
        setCurrentWordIndex(0);
        setScore(0);
        setTimeLeft(60); 
        setIsPlaying(true);
        setCurrentScreen('play');
        setIsLoading(false);
      };

      useEffect(() => {
        if (isPlaying && timeLeft > 0) {
          timerRef.current = setInterval(() => {
            setTimeLeft((prev) => prev - 1);
          }, 1000);
        } else if (timeLeft === 0 && isPlaying) {
          endGame();
        }
        return () => clearInterval(timerRef.current);
      }, [isPlaying, timeLeft]);

      const endGame = () => {
        setIsPlaying(false);
        clearInterval(timerRef.current);
        setCurrentScreen('result');
      };

      const handleNextWord = (isCorrect) => {
        if (isCorrect) {
          setScore((prev) => prev + 1);
        }
        
        if (currentWordIndex + 1 < words.length) {
          setCurrentWordIndex((prev) => prev + 1);
        } else {
          endGame();
        }
      };

      // 畫面：主選單
      const renderMenu = () => (
        <div className="flex flex-col items-center justify-center space-y-6 w-full max-w-md mx-auto mt-20 px-4">
          <div className="text-center mb-8">
            <h1 className="text-5xl font-bold text-blue-600 mb-4 tracking-wider">比手畫腳</h1>
            <p className="text-gray-500">Google Sheets 雲端連線版</p>
          </div>
          
          <button 
            onClick={() => setCurrentScreen('add')}
            className="w-full py-4 bg-green-500 hover:bg-green-600 text-white rounded-2xl text-xl font-bold shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2"
          >
            <IconPlus size={28} />
            學生出題
          </button>

          <button 
            onClick={startGame}
            disabled={isLoading}
            className="w-full py-4 bg-blue-500 hover:bg-blue-600 text-white rounded-2xl text-xl font-bold shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2 disabled:opacity-50"
          >
            {isLoading ? <IconLoader2 className="animate-spin" size={28} /> : <IconPlay size={28} />}
            {isLoading ? '載入題庫中...' : '開始遊戲'}
          </button>

          <button 
            onClick={() => setCurrentScreen('settings')}
            className="w-full py-4 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-2xl text-xl font-bold shadow transform transition active:scale-95 flex items-center justify-center gap-2"
          >
            <IconSettings size={28} />
            系統設定
          </button>
          
          {message && (
            <div className="text-center text-orange-600 font-bold p-3 bg-orange-50 rounded-lg w-full">
              {message}
            </div>
          )}
        </div>
      );

      // 畫面：新增題目
      const renderAddWord = () => {
        const [inputValue, setInputValue] = useState('');
        const onSubmit = (e) => {
          e.preventDefault();
          handleAddWord(inputValue);
          setInputValue('');
        };
        return (
          <div className="flex flex-col items-center w-full max-w-md mx-auto mt-10 px-4">
            <div className="w-full flex justify-between items-center mb-8">
              <button onClick={() => setCurrentScreen('menu')} className="p-2 bg-gray-200 rounded-full hover:bg-gray-300">
                <IconHome size={24} className="text-gray-700" />
              </button>
              <h2 className="text-2xl font-bold text-gray-800">新增題目</h2>
              <div className="w-10"></div>
            </div>
            <form onSubmit={onSubmit} className="w-full bg-white p-6 rounded-3xl shadow-xl space-y-6">
              <div>
                <label className="block text-gray-700 text-lg font-bold mb-2">輸入你想到的詞彙：</label>
                <input 
                  type="text" 
                  value={inputValue}
                  onChange={(e) => setInputValue(e.target.value)}
                  placeholder="例如：蜘蛛人"
                  className="w-full px-4 py-3 rounded-xl border-2 border-gray-300 focus:border-green-500 focus:outline-none text-xl"
                  required
                />
              </div>
              <button 
                type="submit" 
                disabled={isLoading || !inputValue.trim()}
                className="w-full py-3 bg-green-500 hover:bg-green-600 text-white rounded-xl text-xl font-bold shadow transition flex justify-center items-center gap-2 disabled:opacity-50"
              >
                {isLoading ? <IconLoader2 className="animate-spin" /> : '送出題目'}
              </button>
              {message && (
                <div className="text-center text-green-600 font-bold p-3 bg-green-50 rounded-lg">
                  {message}
                </div>
              )}
              {!scriptUrl && (
                <div className="flex items-start gap-2 text-orange-500 text-sm mt-4 p-3 bg-orange-50 rounded-lg">
                  <IconAlertCircle size={20} className="flex-shrink-0" />
                  <p>尚未設定 Google Sheets 網址，題目僅會暫存在本機，重新整理後將會消失。</p>
                </div>
              )}
            </form>
          </div>
        );
      };

      // 畫面：系統設定
      const renderSettings = () => {
        const [tempUrl, setTempUrl] = useState(scriptUrl);
        return (
          <div className="flex flex-col items-center w-full max-w-md mx-auto mt-10 px-4">
            <div className="w-full flex justify-between items-center mb-8">
              <button onClick={() => setCurrentScreen('menu')} className="p-2 bg-gray-200 rounded-full hover:bg-gray-300">
                <IconHome size={24} className="text-gray-700" />
              </button>
              <h2 className="text-2xl font-bold text-gray-800">系統設定</h2>
              <div className="w-10"></div>
            </div>
            <div className="w-full bg-white p-6 rounded-3xl shadow-xl space-y-6">
              <div>
                <label className="block text-gray-700 text-lg font-bold mb-2">Google Apps Script 網址：</label>
                <p className="text-sm text-gray-500 mb-3">請將您部署後的 Web App URL 貼在這裡，才能與 Google Sheets 連線。</p>
                <textarea 
                  value={tempUrl}
                  onChange={(e) => setTempUrl(e.target.value)}
                  placeholder="https://script.google.com/macros/s/..."
                  className="w-full px-4 py-3 rounded-xl border-2 border-gray-300 focus:border-blue-500 focus:outline-none text-sm h-32 break-all"
                />
              </div>
              <button 
                onClick={() => handleSaveUrl(tempUrl)}
                className="w-full py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-xl text-lg font-bold shadow transition"
              >
                儲存設定
              </button>
              {message && (
                <div className="text-center text-blue-600 font-bold p-3 bg-blue-50 rounded-lg">
                  {message}
                </div>
              )}
            </div>
          </div>
        );
      };

      // 畫面：遊戲中
      const renderPlay = () => (
        <div className="flex flex-col items-center justify-between w-full h-screen max-w-2xl mx-auto p-6 bg-blue-50">
          <div className="w-full flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm">
            <div className="text-2xl font-bold text-blue-600">
              得分: <span className="text-4xl">{score}</span>
            </div>
            <div className={`text-2xl font-bold px-4 py-2 rounded-xl ${timeLeft <= 10 ? 'bg-red-100 text-red-600 animate-pulse' : 'bg-gray-100 text-gray-700'}`}>
              {timeLeft} 秒
            </div>
          </div>
          <div className="flex-1 flex items-center justify-center w-full my-8">
            <div className="w-full bg-white p-10 rounded-3xl shadow-2xl flex items-center justify-center min-h-[300px]">
              <h2 className="text-7xl md:text-8xl font-black text-gray-800 text-center tracking-widest break-all">
                {words[currentWordIndex]}
              </h2>
            </div>
          </div>
          <div className="w-full grid grid-cols-2 gap-4 pb-8">
            <button 
              onClick={() => handleNextWord(false)}
              className="py-6 bg-red-500 hover:bg-red-600 text-white rounded-3xl text-3xl font-bold shadow-lg transform transition active:scale-95 flex flex-col items-center justify-center gap-2"
            >
              <IconX size={40} />
              <span>跳過</span>
            </button>
            <button 
              onClick={() => handleNextWord(true)}
              className="py-6 bg-green-500 hover:bg-green-600 text-white rounded-3xl text-3xl font-bold shadow-lg transform transition active:scale-95 flex flex-col items-center justify-center gap-2"
            >
              <IconCheck size={40} />
              <span>答對</span>
            </button>
          </div>
        </div>
      );

      // 畫面：結果
      const renderResult = () => (
        <div className="flex flex-col items-center justify-center space-y-8 w-full h-screen max-w-md mx-auto px-4 bg-gray-50">
          <IconTrophy size={100} className="text-yellow-400" />
          <div className="text-center">
            <h2 className="text-4xl font-bold text-gray-800 mb-2">時間到！</h2>
            <p className="text-2xl text-gray-600">總共答對了</p>
            <p className="text-8xl font-black text-blue-600 my-4">{score}</p>
            <p className="text-2xl text-gray-600">題</p>
          </div>
          <div className="w-full space-y-4 mt-8">
            <button 
              onClick={startGame}
              className="w-full py-4 bg-blue-500 hover:bg-blue-600 text-white rounded-2xl text-xl font-bold shadow-lg flex items-center justify-center gap-2"
            >
              <IconPlay size={24} /> 再玩一次
            </button>
            <button 
              onClick={() => setCurrentScreen('menu')}
              className="w-full py-4 bg-gray-300 hover:bg-gray-400 text-gray-800 rounded-2xl text-xl font-bold shadow flex items-center justify-center gap-2"
            >
              <IconHome size={24} /> 回主選單
            </button>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-slate-100 font-sans selection:bg-blue-200">
          {currentScreen === 'menu' && renderMenu()}
          {currentScreen === 'add' && renderAddWord()}
          {currentScreen === 'settings' && renderSettings()}
          {currentScreen === 'play' && renderPlay()}
          {currentScreen === 'result' && renderResult()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
