<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聽你在吹牛!!! (Google Sheets 雲端版)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
    
    body { 
      font-family: 'Nunito', 'Noto Sans TC', sans-serif; 
      overscroll-behavior-y: none;
      background-color: #f8fafc;
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.9) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }
    @keyframes blob-float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }
    
    .animate-pop-in { animation: popIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-float { animation: float 4s ease-in-out infinite; }

    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      opacity: 0.6;
      animation: blob-float 8s ease-in-out infinite;
    }
    .blob-1 { top: -10%; left: -10%; width: 40vw; height: 40vw; background: #fca5a5; animation-delay: 0s; }
    .blob-2 { bottom: -20%; right: -10%; width: 50vw; height: 50vw; background: #fdba74; animation-direction: reverse; animation-duration: 10s;}
    .blob-3 { top: 30%; left: 50%; width: 35vw; height: 35vw; background: #fbcfe8; animation-delay: 2s; }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const IconPlay = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
    const IconPlus = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconSettings = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
    const IconHome = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
    const IconPause = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>;
    const IconCheck = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>;
    const IconX = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const IconLoader2 = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={`animate-spin ${className}`}><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>;
    const IconTrophy = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"></path></svg>;

    function App() {
      // 遊戲模式切換： 'charades' (比手畫腳) 或 'acting' (情境演戲)
      const [gameMode, setGameMode] = useState('charades');
      const [currentScreen, setCurrentScreen] = useState('menu');
      
      // 注意：如果您重新部署了 Apps Script，請務必更換下方的網址
      const scriptUrl = 'https://script.google.com/macros/s/AKfycbxqNv1T6kY-WwG1criHn1upHDZ8pnz91WFcLEbyxEoen79ujaoc4tu6dBC2kl7-cmfE8Q/exec';
      
      const [isLoading, setIsLoading] = useState(false);
      const [message, setMessage] = useState('');
      
      // 狀態：一般比手畫腳
      const [words, setWords] = useState([]);
      const [currentWordIndex, setCurrentWordIndex] = useState(0);
      const [inputValue, setInputValue] = useState('');

      // 狀態：情境演戲模式
      const [actingLists, setActingLists] = useState({ persons: [], locations: [], actions: [] });
      const [currentActing, setCurrentActing] = useState({ person: '', location: '', action: '' });
      const [actingInput, setActingInput] = useState({ person: '', location: '', action: '' });

      const [score, setScore] = useState(0);
      const [timeLeft, setTimeLeft] = useState(60);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isPaused, setIsPaused] = useState(false);
      const [gameDuration, setGameDuration] = useState(60);
      const [tempDuration, setTempDuration] = useState(60);
      
      const timerRef = useRef(null);

      // 預設資料庫 (無網路時的備用)
      const defaultWords = ['蘋果', '大象', '游泳', '看電影', '溜冰', '香蕉'];
      const defaultActing = {
        persons: ['校長', '蜘蛛人', '阿嬤', '小屁孩'],
        locations: ['在廁所', '在月球上', '在超商', '在海底'],
        actions: ['跳舞', '吃泡麵', '打蚊子', '睡著了']
      };

      useEffect(() => {
        const savedDuration = localStorage.getItem('charadesGameDuration');
        if (savedDuration) {
          const duration = parseInt(savedDuration, 10);
          setGameDuration(duration);
          setTempDuration(duration);
        }
      }, []);

      const handleSaveSettings = (duration) => {
        setGameDuration(duration);
        localStorage.setItem('charadesGameDuration', duration.toString());
        setMessage('遊戲時間已儲存！');
        setTimeout(() => setMessage(''), 3000);
      };

      // 提交一般題目
      const handleAddWord = async (e) => {
        e.preventDefault();
        if (!inputValue.trim()) return;
        setIsLoading(true); setMessage('');
        try {
          const url = `${scriptUrl}?action=addWord&word=${encodeURIComponent(inputValue)}`;
          const response = await fetch(url);
          await response.json();
          setMessage('✨ 題目新增成功！');
          setInputValue('');
        } catch (error) {
          setMessage('連線錯誤，請確認網頁是否正常連線。');
        } finally {
          setIsLoading(false);
          setTimeout(() => setMessage(''), 3000);
        }
      };

      // 提交情境演戲題目
      const handleAddActing = async (e) => {
        e.preventDefault();
        if (!actingInput.person.trim() || !actingInput.location.trim() || !actingInput.action.trim()) return;
        setIsLoading(true); setMessage('');
        try {
          const url = `${scriptUrl}?action=addActing&person=${encodeURIComponent(actingInput.person)}&location=${encodeURIComponent(actingInput.location)}&act=${encodeURIComponent(actingInput.action)}`;
          const response = await fetch(url);
          await response.json();
          setMessage('✨ 情境組合新增成功！');
          setActingInput({ person: '', location: '', action: '' });
        } catch (error) {
          setMessage('連線錯誤，請確認網頁是否正常連線。');
        } finally {
          setIsLoading(false);
          setTimeout(() => setMessage(''), 3000);
        }
      };

      // 隨機抽取情境組合的函數
      const drawRandomActing = (lists) => {
        const p = lists.persons[Math.floor(Math.random() * lists.persons.length)] || '神秘人';
        const l = lists.locations[Math.floor(Math.random() * lists.locations.length)] || '神秘地點';
        const a = lists.actions[Math.floor(Math.random() * lists.actions.length)] || '發呆';
        return { person: p, location: l, action: a };
      };

      const startGame = async () => {
        setIsLoading(true);
        setMessage('');

        if (gameMode === 'charades') {
          let gameWords = [...defaultWords];
          try {
            const response = await fetch(`${scriptUrl}?action=getWords`);
            const result = await response.json();
            if (result && result.length > 0) gameWords = result;
          } catch (error) {
             setMessage('無法連線資料庫，使用預設題庫。');
             setTimeout(() => setMessage(''), 3000);
          }
          setWords(gameWords.sort(() => 0.5 - Math.random()));
          setCurrentWordIndex(0);

        } else {
          // 啟動情境演戲模式
          let lists = { ...defaultActing };
          try {
            const response = await fetch(`${scriptUrl}?action=getActing`);
            const result = await response.json();
            // 只要其中一個有資料，我們就合併進去
            if (result.persons?.length > 0) lists.persons = result.persons;
            if (result.locations?.length > 0) lists.locations = result.locations;
            if (result.actions?.length > 0) lists.actions = result.actions;
          } catch (error) {
             setMessage('無法連線資料庫，使用預設題庫。');
             setTimeout(() => setMessage(''), 3000);
          }
          setActingLists(lists);
          setCurrentActing(drawRandomActing(lists));
        }

        setScore(0);
        setTimeLeft(gameDuration);
        setIsPlaying(true);
        setIsPaused(false);
        setCurrentScreen('play');
        setIsLoading(false);
      };

      useEffect(() => {
        if (isPlaying && !isPaused && timeLeft > 0) {
          timerRef.current = setInterval(() => setTimeLeft((prev) => prev - 1), 1000);
        } else if (timeLeft === 0 && isPlaying) {
          endGame();
        }
        return () => clearInterval(timerRef.current);
      }, [isPlaying, isPaused, timeLeft]);

      const endGame = () => {
        setIsPlaying(false);
        clearInterval(timerRef.current);
        setCurrentScreen('result');
      };

      const handleNextWord = (isCorrect) => {
        if (isCorrect) setScore((prev) => prev + 1);

        if (gameMode === 'charades') {
          if (currentWordIndex + 1 < words.length) {
            setCurrentWordIndex((prev) => prev + 1);
          } else {
            endGame();
          }
        } else {
          // 情境演戲模式，直接無限隨機抽取新的組合
          setCurrentActing(drawRandomActing(actingLists));
        }
      };

      const renderHeader = (title) => (
        <div className="w-full flex items-center mb-8 relative">
          <button 
            onClick={() => setCurrentScreen('menu')} 
            className="absolute left-0 p-3 bg-white/80 hover:bg-white rounded-2xl shadow-sm text-gray-700 transition-all hover:scale-105 z-10"
          >
            <IconHome size={24} />
          </button>
          <h2 className="text-3xl font-black text-gray-800 w-full text-center tracking-widest drop-shadow-sm">{title}</h2>
        </div>
      );

      // --- 畫面：主選單 ---
      const renderMenu = () => (
        <div className="flex flex-col items-center justify-center w-full max-w-md mx-auto min-h-screen px-4 animate-pop-in relative z-10">
          
          {/* 模式切換標籤 */}
          <div className="glass-card flex p-1.5 rounded-full mb-8 w-full shadow-sm">
            <button 
              onClick={() => setGameMode('charades')}
              className={`flex-1 py-3 text-lg font-bold rounded-full transition-all ${gameMode === 'charades' ? 'bg-orange-500 text-white shadow-md' : 'text-gray-500 hover:text-orange-500'}`}
            >
              比手畫腳
            </button>
            <button 
              onClick={() => setGameMode('acting')}
              className={`flex-1 py-3 text-lg font-bold rounded-full transition-all ${gameMode === 'acting' ? 'bg-rose-500 text-white shadow-md' : 'text-gray-500 hover:text-rose-500'}`}
            >
              情境演戲
            </button>
          </div>

          <div className="text-center mb-10 animate-float">
            <div className="inline-block px-5 py-1.5 rounded-full bg-orange-100 text-orange-600 font-bold text-sm mb-4 shadow-sm border border-orange-200 tracking-wide">
              {gameMode === 'charades' ? '經典詞彙挑戰' : '隨機組合大爆笑'}
            </div>
            <h1 className="text-5xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-rose-500 drop-shadow-md tracking-widest py-2">
              聽你在吹牛!!!
            </h1>
          </div>
          
          <div className="w-full space-y-5">
            <button 
              onClick={startGame}
              disabled={isLoading}
              className="group relative w-full py-5 bg-gradient-to-r from-orange-400 to-rose-500 hover:from-orange-500 hover:to-rose-600 text-white rounded-[2rem] text-2xl font-black shadow-[0_10px_40px_rgb(249,115,22,0.4)] transform transition-all active:scale-95 flex items-center justify-center gap-3 disabled:opacity-70 disabled:cursor-wait border border-white/20"
            >
              {isLoading ? <IconLoader2 size={32} /> : <IconPlay size={32} className="group-hover:scale-110 transition-transform" />}
              {isLoading ? '載入題庫中...' : '開始遊戲'}
            </button>

            <div className="grid grid-cols-2 gap-4">
              <button 
                onClick={() => setCurrentScreen('add')}
                className="w-full py-5 glass-card hover:bg-white/90 text-rose-600 rounded-[2rem] text-lg font-bold transition-all active:scale-95 flex flex-col items-center justify-center gap-2 group"
              >
                <div className="p-2 bg-rose-100 rounded-2xl group-hover:bg-rose-200 transition-colors"><IconPlus size={24} /></div>
                學生出題
              </button>

              <button 
                onClick={() => setCurrentScreen('settings')}
                className="w-full py-5 glass-card hover:bg-white/90 text-purple-600 rounded-[2rem] text-lg font-bold transition-all active:scale-95 flex flex-col items-center justify-center gap-2 group"
              >
                <div className="p-2 bg-purple-100 rounded-2xl group-hover:bg-purple-200 transition-colors"><IconSettings size={24} /></div>
                遊戲設定
              </button>
            </div>
          </div>
          
          {message && (
            <div className="mt-8 text-center text-rose-600 font-bold p-4 glass-card rounded-2xl w-full border-rose-200 animate-pop-in">
              {message}
            </div>
          )}
        </div>
      );

      // --- 畫面：新增題目 (動態切換表單) ---
      const renderAddWord = () => (
        <div className="flex flex-col items-center w-full max-w-md mx-auto pt-10 px-5 animate-pop-in relative z-10">
          {renderHeader(gameMode === 'charades' ? '新增詞彙' : '新增情境')}
          
          {gameMode === 'charades' ? (
            <form onSubmit={handleAddWord} className="w-full glass-card p-8 rounded-[2.5rem] space-y-8">
              <div className="text-center">
                <div className="inline-flex justify-center items-center w-20 h-20 rounded-[2rem] bg-gradient-to-br from-rose-100 to-orange-100 text-rose-500 mb-6 shadow-inner border border-white">
                  <IconPlus size={40} />
                </div>
                <label className="block text-gray-700 text-xl font-bold mb-4">輸入你想到的詞彙</label>
                <input 
                  type="text" 
                  value={inputValue}
                  onChange={(e) => setInputValue(e.target.value)}
                  placeholder="例如：蜘蛛人"
                  className="w-full px-6 py-5 rounded-2xl bg-white/80 border-2 border-transparent focus:border-rose-400 focus:ring-4 focus:ring-rose-400/20 focus:outline-none text-2xl text-center font-bold shadow-inner transition-all placeholder:font-normal placeholder:text-gray-400"
                  required
                />
              </div>
              <button 
                type="submit" 
                disabled={isLoading || !inputValue.trim()}
                className="w-full py-5 bg-gradient-to-r from-rose-400 to-orange-400 text-white rounded-[2rem] text-xl font-black shadow-lg transition-all transform active:scale-95 flex justify-center gap-2 disabled:opacity-50"
              >
                {isLoading ? <IconLoader2 /> : '送出題目'}
              </button>
            </form>
          ) : (
            <form onSubmit={handleAddActing} className="w-full glass-card p-8 rounded-[2.5rem] space-y-6">
              <div className="text-center mb-2">
                <span className="bg-rose-100 text-rose-600 px-4 py-1.5 rounded-full font-bold text-sm">組合出題</span>
              </div>
              <div className="space-y-4">
                <div>
                  <label className="block text-gray-700 font-bold mb-2 flex items-center gap-2">👤 人物 (是誰?)</label>
                  <input type="text" value={actingInput.person} onChange={(e) => setActingInput({...actingInput, person: e.target.value})} placeholder="例如：瑪利歐" className="w-full px-5 py-3 rounded-2xl bg-white/80 focus:ring-4 focus:ring-rose-400/20 focus:outline-none font-bold shadow-inner transition-all" required />
                </div>
                <div>
                  <label className="block text-gray-700 font-bold mb-2 flex items-center gap-2">📍 地點 (在哪?)</label>
                  <input type="text" value={actingInput.location} onChange={(e) => setActingInput({...actingInput, location: e.target.value})} placeholder="例如：在電影院" className="w-full px-5 py-3 rounded-2xl bg-white/80 focus:ring-4 focus:ring-rose-400/20 focus:outline-none font-bold shadow-inner transition-all" required />
                </div>
                <div>
                  <label className="block text-gray-700 font-bold mb-2 flex items-center gap-2">🎬 動作 (做什麼?)</label>
                  <input type="text" value={actingInput.action} onChange={(e) => setActingInput({...actingInput, action: e.target.value})} placeholder="例如：跳芭蕾舞" className="w-full px-5 py-3 rounded-2xl bg-white/80 focus:ring-4 focus:ring-rose-400/20 focus:outline-none font-bold shadow-inner transition-all" required />
                </div>
              </div>
              <button 
                type="submit" 
                disabled={isLoading || !actingInput.person || !actingInput.location || !actingInput.action}
                className="w-full py-5 mt-4 bg-gradient-to-r from-rose-400 to-orange-400 text-white rounded-[2rem] text-xl font-black shadow-lg transition-all transform active:scale-95 flex justify-center gap-2 disabled:opacity-50"
              >
                {isLoading ? <IconLoader2 /> : '送出情境組合'}
              </button>
            </form>
          )}

          {message && (
            <div className="mt-6 text-center text-rose-700 font-bold p-4 bg-white/80 border border-rose-200 rounded-2xl animate-pop-in shadow-sm w-full">
              {message}
            </div>
          )}
        </div>
      );

      // --- 畫面：遊戲時間設定 ---
      const renderSettings = () => (
        <div className="flex flex-col items-center w-full max-w-md mx-auto pt-16 px-5 animate-pop-in relative z-10">
          {renderHeader('遊戲設定')}
          <div className="w-full glass-card p-8 rounded-[2.5rem] space-y-8">
            <div className="text-center">
              <div className="inline-flex justify-center items-center w-20 h-20 rounded-[2rem] bg-gradient-to-br from-purple-100 to-fuchsia-100 text-purple-600 mb-6 shadow-inner border border-white">
                <IconSettings size={40} />
              </div>
              <label className="block text-gray-700 text-xl font-bold mb-2">每局遊戲時間</label>
              <p className="text-sm text-gray-500 mb-6 font-bold">請輸入您希望的倒數秒數</p>
              <div className="relative flex items-center justify-center">
                <input 
                  type="number" min="10" max="300"
                  value={tempDuration} onChange={(e) => setTempDuration(parseInt(e.target.value) || 60)}
                  className="w-40 px-4 py-5 rounded-3xl bg-white/80 border-2 border-transparent focus:border-purple-400 focus:ring-4 focus:ring-purple-400/20 focus:outline-none text-5xl text-center font-black text-purple-600 shadow-inner transition-all"
                />
                <span className="absolute right-10 text-xl font-bold text-gray-400">秒</span>
              </div>
            </div>
            <button 
              onClick={() => handleSaveSettings(tempDuration)}
              className="w-full py-5 bg-gradient-to-r from-purple-500 to-fuchsia-500 hover:from-purple-600 hover:to-fuchsia-600 text-white rounded-[2rem] text-xl font-black shadow-[0_8px_30px_rgb(168,85,247,0.3)] transition-all transform active:scale-95 border border-white/20"
            >
              儲存設定
            </button>
            {message && <div className="text-center text-purple-700 font-bold p-4 bg-white/80 border border-purple-200 rounded-2xl animate-pop-in shadow-sm">{message}</div>}
          </div>
        </div>
      );

      // --- 畫面：遊戲中 ---
      const renderPlay = () => (
        <div className="flex flex-col items-center justify-between w-full h-screen max-w-5xl mx-auto p-4 md:p-8 animate-pop-in relative z-10">
          
          <div className="w-full flex justify-between items-center glass-card p-3 md:p-4 rounded-[2rem]">
            <div className="flex gap-2 md:gap-4">
              <button onClick={() => { setIsPlaying(false); setCurrentScreen('menu'); }} className="p-4 bg-white/60 hover:bg-white rounded-2xl text-gray-600 hover:text-orange-500 transition-all shadow-sm">
                <IconHome size={28} />
              </button>
              <button onClick={() => setIsPaused(!isPaused)} className={`p-4 rounded-2xl transition-all shadow-sm ${isPaused ? 'bg-orange-500 text-white' : 'bg-white/60 hover:bg-white text-gray-600'}`}>
                {isPaused ? <IconPlay size={28} /> : <IconPause size={28} />}
              </button>
            </div>
            <div className="flex items-center gap-4 md:gap-8 bg-white/60 py-2 md:py-3 px-6 md:px-8 rounded-3xl border border-white shadow-sm">
              <div className="text-lg md:text-2xl font-bold text-gray-500 flex items-baseline gap-2">得分 <span className="text-4xl md:text-5xl font-black text-orange-500">{score}</span></div>
              <div className="w-px h-12 bg-gray-300/50 hidden md:block"></div>
              <div className={`text-2xl md:text-4xl font-black transition-colors duration-300 ${timeLeft <= 10 && !isPaused ? 'text-rose-500 animate-pulse drop-shadow-md' : 'text-slate-700'}`}>{timeLeft}s</div>
            </div>
          </div>

          <div className="flex-1 flex items-center justify-center w-full my-6">
            <div className={`relative w-full h-full max-h-[500px] flex flex-col items-center justify-center rounded-[3rem] transition-all duration-500 px-6 py-10 ${isPaused ? 'bg-white/40 backdrop-blur-sm border-4 border-dashed border-gray-300/50' : 'glass-card border-2 border-white'}`}>
              {isPaused ? (
                <div className="text-center">
                  <IconPause size={80} className="mx-auto text-gray-400 mb-6" />
                  <h2 className="text-5xl md:text-7xl font-black text-gray-500 tracking-widest drop-shadow-sm">遊戲暫停</h2>
                </div>
              ) : (
                gameMode === 'charades' ? (
                  // 比手畫腳畫面
                  <h2 className="text-6xl md:text-[8rem] leading-tight font-black text-slate-800 text-center tracking-widest break-words drop-shadow-md animate-pop-in" key={currentWordIndex}>
                    {words[currentWordIndex]}
                  </h2>
                ) : (
                  // 情境演戲畫面 (分三行顯示)
                  <div className="flex flex-col gap-6 md:gap-10 items-center justify-center w-full animate-pop-in" key={score}>
                    <div className="text-3xl md:text-5xl font-black text-blue-600 drop-shadow-sm text-center">
                      <span className="text-2xl md:text-4xl opacity-50 mr-2">👤</span>
                      {currentActing.person}
                    </div>
                    <div className="text-3xl md:text-5xl font-black text-emerald-600 drop-shadow-sm text-center">
                      <span className="text-2xl md:text-4xl opacity-50 mr-2">📍</span>
                      {currentActing.location}
                    </div>
                    <div className="text-4xl md:text-6xl font-black text-rose-600 drop-shadow-md text-center mt-2">
                      <span className="text-3xl md:text-5xl opacity-50 mr-2">🎬</span>
                      {currentActing.action}
                    </div>
                  </div>
                )
              )}
            </div>
          </div>

          <div className="w-full grid grid-cols-2 gap-4 md:gap-8 pb-4">
            <button onClick={() => handleNextWord(false)} disabled={isPaused} className={`py-8 md:py-10 rounded-[2.5rem] text-3xl md:text-4xl font-black shadow-xl flex flex-col items-center justify-center gap-3 transition-all ${isPaused ? 'bg-gray-300/50 text-gray-400 cursor-not-allowed opacity-50 shadow-none' : 'bg-gradient-to-b from-rose-400 to-rose-500 hover:to-rose-600 text-white shadow-rose-500/30 transform active:scale-[0.97] active:translate-y-2'}`}>
              <IconX size={48} />
              <span className="tracking-widest">跳過</span>
            </button>
            <button onClick={() => handleNextWord(true)} disabled={isPaused} className={`py-8 md:py-10 rounded-[2.5rem] text-3xl md:text-4xl font-black shadow-xl flex flex-col items-center justify-center gap-3 transition-all ${isPaused ? 'bg-gray-300/50 text-gray-400 cursor-not-allowed opacity-50 shadow-none' : 'bg-gradient-to-b from-emerald-400 to-emerald-500 hover:to-emerald-600 text-white shadow-emerald-500/30 transform active:scale-[0.97] active:translate-y-2'}`}>
              <IconCheck size={48} />
              <span className="tracking-widest">答對</span>
            </button>
          </div>
        </div>
      );

      // --- 畫面：結果 ---
      const renderResult = () => (
        <div className="flex flex-col items-center justify-center w-full max-w-md mx-auto min-h-screen px-5 animate-pop-in relative z-10">
          <div className="glass-card w-full p-12 rounded-[3rem] flex flex-col items-center text-center relative overflow-hidden border border-white">
            <div className="absolute top-0 left-1/2 -translate-x-1/2 w-56 h-56 bg-orange-300 rounded-full mix-blend-multiply filter blur-3xl opacity-40"></div>
            <IconTrophy size={140} className="text-orange-400 drop-shadow-[0_10px_20px_rgba(251,146,60,0.4)] mb-8 animate-float relative z-10" />
            <h2 className="text-5xl font-black text-gray-800 mb-4 tracking-widest relative z-10">時間到！</h2>
            <p className="text-2xl text-gray-500 font-bold relative z-10">團隊總共答對了</p>
            <div className="my-10 flex items-end justify-center gap-3 relative z-10">
              <span className="text-[7rem] font-black text-transparent bg-clip-text bg-gradient-to-b from-orange-500 to-rose-600 drop-shadow-md leading-none">{score}</span>
              <span className="text-4xl text-rose-400 font-black mb-3">題</span>
            </div>
            <div className="w-full space-y-4 relative z-10">
              <button onClick={startGame} className="w-full py-5 bg-gradient-to-r from-orange-400 to-rose-500 hover:from-orange-500 hover:to-rose-600 text-white rounded-[2rem] text-xl font-black shadow-lg flex items-center justify-center gap-2 transform active:scale-95 transition-all"><IconPlay size={28} /> 再玩一次</button>
              <button onClick={() => setCurrentScreen('menu')} className="w-full py-5 bg-white/80 hover:bg-white text-gray-600 rounded-[2rem] text-xl font-bold shadow-sm flex items-center justify-center gap-2 transform active:scale-95 transition-all"><IconHome size={28} /> 回主選單</button>
            </div>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen relative overflow-hidden text-gray-800 selection:bg-orange-200">
          <div className="bg-blob blob-1"></div><div className="bg-blob blob-2"></div><div className="bg-blob blob-3"></div>
          {currentScreen === 'menu' && renderMenu()}
          {currentScreen === 'add' && renderAddWord()}
          {currentScreen === 'settings' && renderSettings()}
          {currentScreen === 'play' && renderPlay()}
          {currentScreen === 'result' && renderResult()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
